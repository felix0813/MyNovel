<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>编辑小说</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <header class="topbar">
      <h1>✍️ 编辑小说</h1>
      <a class="btn secondary" href="./index.html">返回首页</a>
    </header>

    <main class="container">
      <form id="novelForm" class="card form-grid">
        <label>名称<input required name="name" /></label>
        <label>平台<input name="platform" /></label>
        <label>网址<input name="url" type="url" /></label>
        <label>文件路径<input name="file" /></label>
        <label>状态
          <select name="status" required>
            <option value="unread">未读</option>
            <option value="reading">在读</option>
            <option value="finished">已读</option>
          </select>
        </label>
        <label>评分(0-10)<input name="rating" type="number" min="0" max="10" value="0" /></label>
        <label class="full">简介<textarea name="description" rows="4"></textarea></label>

        <div class="full actions">
          <button class="btn" type="submit">保存</button>
          <button id="deleteBtn" class="btn danger" type="button" hidden>删除</button>
        </div>
      </form>
    </main>

    <script src="./edit.js"></script>
  </body>
</html>
